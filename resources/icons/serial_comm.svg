<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2196F3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1565C0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景圆角矩形 -->
  <rect x="8" y="8" width="240" height="240" rx="32" ry="32" fill="url(#bg)"/>
  
  <!-- 串口接头图形 -->
  <rect x="60" y="60" width="136" height="80" rx="8" ry="8" fill="white" opacity="0.9"/>
  <rect x="70" y="70" width="20" height="20" rx="4" ry="4" fill="#2196F3"/>
  <rect x="100" y="70" width="20" height="20" rx="4" ry="4" fill="#2196F3"/>
  <rect x="130" y="70" width="20" height="20" rx="4" ry="4" fill="#2196F3"/>
  <rect x="160" y="70" width="20" height="20" rx="4" ry="4" fill="#2196F3"/>
  
  <!-- 连接线 -->
  <line x1="80" y1="100" x2="80" y2="120" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <line x1="110" y1="100" x2="110" y2="120" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <line x1="140" y1="100" x2="140" y2="120" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <line x1="170" y1="100" x2="170" y2="120" stroke="white" stroke-width="4" stroke-linecap="round"/>
  
  <!-- 信号波形 -->
  <path d="M 60 160 Q 80 140, 100 160 Q 120 180, 140 160 Q 160 140, 180 160 L 196 160" 
        stroke="white" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- RX/TX 文字 -->
  <text x="75" y="200" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white">RX</text>
  <text x="145" y="200" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white">TX</text>
</svg>
